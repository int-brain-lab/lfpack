name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run tests with coverage
        run: uv run pytest tests/ -v --cov=lfpack --cov-report=term-missing --cov-report=json

      - name: Post coverage to step summary
        if: always()
        run: |
          python -c "
          import json, pathlib, os
          data = json.loads(pathlib.Path('coverage.json').read_text())
          t = data['totals']
          lines = [
            '## Coverage report',
            f\"| Statements | Covered | Missed | % |\",
            f\"|---|---|---|---|\",
            f\"| {t['num_statements']} | {t['covered_lines']} | {t['missing_lines']} | **{t['percent_covered']:.1f}%** |\",
            '',
            '| File | Stmts | Miss | Cover |',
            '|---|---|---|---|',
          ]
          for path, info in data['files'].items():
            s = info['summary']
            lines.append(f\"| \`{path}\` | {s['num_statements']} | {s['missing_lines']} | {s['percent_covered']:.1f}% |\")
          summary = os.environ.get('GITHUB_STEP_SUMMARY', '/dev/null')
          with open(summary, 'a') as f:
            f.write('\n'.join(lines) + '\n')
          "
